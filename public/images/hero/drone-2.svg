<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f35"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4a8abf;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0d1f35;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <ellipse cx="960" cy="500" rx="600" ry="400" fill="url(#glow)"/>
  <!-- Grid lines (aerial map effect) -->
  <g stroke="#1e4a7a" stroke-width="1" opacity="0.4">
    <line x1="0" y1="200" x2="1920" y2="200"/>
    <line x1="0" y1="400" x2="1920" y2="400"/>
    <line x1="0" y1="600" x2="1920" y2="600"/>
    <line x1="0" y1="800" x2="1920" y2="800"/>
    <line x1="320" y1="0" x2="320" y2="1080"/>
    <line x1="640" y1="0" x2="640" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1280" y1="0" x2="1280" y2="1080"/>
    <line x1="1600" y1="0" x2="1600" y2="1080"/>
  </g>
  <!-- Drone fleet -->
  <g transform="translate(960,400)" opacity="0.95">
    <rect x="-45" y="-18" width="90" height="36" rx="10" fill="#1e3a5a" stroke="#5aafef" stroke-width="2.5"/>
    <line x1="-45" y1="-8" x2="-130" y2="-50" stroke="#3a7abf" stroke-width="5"/>
    <line x1="45" y1="-8" x2="130" y2="-50" stroke="#3a7abf" stroke-width="5"/>
    <line x1="-45" y1="8" x2="-130" y2="50" stroke="#3a7abf" stroke-width="5"/>
    <line x1="45" y1="8" x2="130" y2="50" stroke="#3a7abf" stroke-width="5"/>
    <ellipse cx="-130" cy="-50" rx="40" ry="7" fill="none" stroke="#7acfff" stroke-width="2.5" opacity="0.8"/>
    <ellipse cx="130" cy="-50" rx="40" ry="7" fill="none" stroke="#7acfff" stroke-width="2.5" opacity="0.8"/>
    <ellipse cx="-130" cy="50" rx="40" ry="7" fill="none" stroke="#7acfff" stroke-width="2.5" opacity="0.8"/>
    <ellipse cx="130" cy="50" rx="40" ry="7" fill="none" stroke="#7acfff" stroke-width="2.5" opacity="0.8"/>
    <circle cx="0" cy="24" r="14" fill="#0f1e2e" stroke="#5aafef" stroke-width="2"/>
    <circle cx="0" cy="24" r="8" fill="#050f1a"/>
    <circle cx="35" cy="0" r="5" fill="#00ffaa" opacity="0.95"/>
    <circle cx="-35" cy="0" r="3" fill="#ff4444" opacity="0.8"/>
  </g>
  <!-- Secondary drones -->
  <g transform="translate(400,250)" opacity="0.5" scale="0.5">
    <rect x="-30" y="-12" width="60" height="24" rx="6" fill="#1e3a5a" stroke="#5aafef" stroke-width="2"/>
    <ellipse cx="-80" cy="-30" rx="25" ry="5" fill="none" stroke="#7acfff" stroke-width="1.5"/>
    <ellipse cx="80" cy="-30" rx="25" ry="5" fill="none" stroke="#7acfff" stroke-width="1.5"/>
    <ellipse cx="-80" cy="30" rx="25" ry="5" fill="none" stroke="#7acfff" stroke-width="1.5"/>
    <ellipse cx="80" cy="30" rx="25" ry="5" fill="none" stroke="#7acfff" stroke-width="1.5"/>
  </g>
  <g transform="translate(1500,300)" opacity="0.4">
    <rect x="-20" y="-8" width="40" height="16" rx="4" fill="#1e3a5a" stroke="#5aafef" stroke-width="1.5"/>
    <ellipse cx="-50" cy="-20" rx="18" ry="4" fill="none" stroke="#7acfff" stroke-width="1.5"/>
    <ellipse cx="50" cy="-20" rx="18" ry="4" fill="none" stroke="#7acfff" stroke-width="1.5"/>
    <ellipse cx="-50" cy="20" rx="18" ry="4" fill="none" stroke="#7acfff" stroke-width="1.5"/>
    <ellipse cx="50" cy="20" rx="18" ry="4" fill="none" stroke="#7acfff" stroke-width="1.5"/>
  </g>
  <text x="960" y="680" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#5aafef" opacity="0.5">RAFID INDUSTRIES — Fleet Intelligence</text>
</svg>
