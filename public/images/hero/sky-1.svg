<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="40%" style="stop-color:#1565c0"/>
      <stop offset="70%" style="stop-color:#42a5f5"/>
      <stop offset="100%" style="stop-color:#e3f2fd"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="960" cy="900" r="120" fill="#fff176" opacity="0.15"/>
  <circle cx="960" cy="900" r="80" fill="#fff59d" opacity="0.2"/>
  <circle cx="960" cy="900" r="50" fill="#ffee58" opacity="0.3"/>
  <!-- Clouds -->
  <g fill="white" opacity="0.25">
    <ellipse cx="300" cy="400" rx="180" ry="60"/>
    <ellipse cx="200" cy="420" rx="120" ry="50"/>
    <ellipse cx="400" cy="410" rx="140" ry="55"/>
  </g>
  <g fill="white" opacity="0.2">
    <ellipse cx="1500" cy="300" rx="200" ry="65"/>
    <ellipse cx="1380" cy="320" rx="130" ry="55"/>
    <ellipse cx="1620" cy="315" rx="150" ry="58"/>
  </g>
  <g fill="white" opacity="0.15">
    <ellipse cx="900" cy="500" rx="160" ry="50"/>
    <ellipse cx="800" cy="515" rx="100" ry="45"/>
    <ellipse cx="1000" cy="510" rx="120" ry="48"/>
  </g>
  <!-- Flight path arc -->
  <path d="M 0 700 Q 960 200 1920 650" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.15" stroke-dasharray="20,15"/>
  <!-- Drone on path -->
  <g transform="translate(960,380)">
    <rect x="-25" y="-10" width="50" height="20" rx="6" fill="#1e3a5a" stroke="#fff" stroke-width="1.5" opacity="0.9"/>
    <ellipse cx="-60" cy="-20" rx="22" ry="4" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <ellipse cx="60" cy="-20" rx="22" ry="4" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <ellipse cx="-60" cy="20" rx="22" ry="4" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <ellipse cx="60" cy="20" rx="22" ry="4" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <circle cx="20" cy="0" r="4" fill="#00ff88" opacity="0.9"/>
  </g>
  <text x="960" y="200" text-anchor="middle" font-family="sans-serif" font-size="36" fill="white" opacity="0.3">RAFID INDUSTRIES — Clear Skies</text>
</svg>
