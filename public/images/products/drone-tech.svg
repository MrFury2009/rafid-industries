<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3561"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Tech lines -->
  <g stroke="#0f3460" stroke-width="1" opacity="0.5">
    <line x1="0" y1="0" x2="800" y2="600"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  <!-- Main drone - detailed technical view -->
  <g transform="translate(400,300)">
    <!-- Main chassis -->
    <rect x="-60" y="-20" width="120" height="40" rx="12" fill="url(#body)" stroke="#533483" stroke-width="2.5"/>
    <!-- Center cross -->
    <rect x="-80" y="-5" width="160" height="10" rx="3" fill="#2d3561" stroke="#533483" stroke-width="1.5"/>
    <rect x="-5" y="-80" width="10" height="160" rx="3" fill="#2d3561" stroke="#533483" stroke-width="1.5"/>
    <!-- Motor mounts -->
    <circle cx="-90" cy="-90" r="20" fill="#1a1a2e" stroke="#533483" stroke-width="2.5"/>
    <circle cx="90" cy="-90" r="20" fill="#1a1a2e" stroke="#533483" stroke-width="2.5"/>
    <circle cx="-90" cy="90" r="20" fill="#1a1a2e" stroke="#533483" stroke-width="2.5"/>
    <circle cx="90" cy="90" r="20" fill="#1a1a2e" stroke="#533483" stroke-width="2.5"/>
    <!-- Motors -->
    <circle cx="-90" cy="-90" r="12" fill="#533483" opacity="0.8"/>
    <circle cx="90" cy="-90" r="12" fill="#533483" opacity="0.8"/>
    <circle cx="-90" cy="90" r="12" fill="#533483" opacity="0.8"/>
    <circle cx="90" cy="90" r="12" fill="#533483" opacity="0.8"/>
    <!-- Propellers -->
    <ellipse cx="-90" cy="-90" rx="48" ry="6" fill="#7c4dff" opacity="0.5"/>
    <ellipse cx="90" cy="-90" rx="48" ry="6" fill="#7c4dff" opacity="0.5"/>
    <ellipse cx="-90" cy="90" rx="48" ry="6" fill="#7c4dff" opacity="0.5"/>
    <ellipse cx="90" cy="90" rx="48" ry="6" fill="#7c4dff" opacity="0.5"/>
    <!-- Camera gimbal -->
    <circle cx="0" cy="30" r="20" fill="#0f3460" stroke="#533483" stroke-width="2"/>
    <circle cx="0" cy="30" r="12" fill="#050d1a"/>
    <circle cx="0" cy="30" r="6" fill="#e040fb" opacity="0.8"/>
    <!-- LEDs -->
    <circle cx="-50" cy="0" r="5" fill="#00e5ff" opacity="0.9"/>
    <circle cx="50" cy="0" r="5" fill="#ff1744" opacity="0.9"/>
    <!-- Battery indicator -->
    <rect x="-20" y="-12" width="40" height="8" rx="2" fill="#263238"/>
    <rect x="-18" y="-10" width="28" height="4" rx="1" fill="#00e676" opacity="0.8"/>
  </g>
  <!-- Telemetry readouts -->
  <text x="40" y="80" font-family="monospace" font-size="11" fill="#00e5ff" opacity="0.6">ALT: 142m</text>
  <text x="40" y="96" font-family="monospace" font-size="11" fill="#00e5ff" opacity="0.6">SPD: 28km/h</text>
  <text x="40" y="112" font-family="monospace" font-size="11" fill="#00e5ff" opacity="0.6">BAT: 87%</text>
  <text x="640" y="80" font-family="monospace" font-size="11" fill="#7c4dff" opacity="0.6">GPS: LOCKED</text>
  <text x="640" y="96" font-family="monospace" font-size="11" fill="#7c4dff" opacity="0.6">SAT: 12</text>
  <text x="640" y="112" font-family="monospace" font-size="11" fill="#7c4dff" opacity="0.6">SIG: STRONG</text>
  <text x="400" y="555" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#7c4dff" opacity="0.5">Rafid Industries — Advanced Drone Technology</text>
</svg>
