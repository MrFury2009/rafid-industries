<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2e"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Map grid -->
  <g stroke="#1e4a6a" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  <!-- Zone overlays -->
  <rect x="150" y="120" width="200" height="150" rx="4" fill="#f44336" opacity="0.15" stroke="#f44336" stroke-width="1.5" stroke-dasharray="8,4"/>
  <rect x="400" y="80" width="250" height="180" rx="4" fill="#ff9800" opacity="0.12" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="8,4"/>
  <rect x="100" y="350" width="280" height="180" rx="4" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1.5"/>
  <rect x="450" y="320" width="300" height="220" rx="4" fill="#4caf50" opacity="0.12" stroke="#4caf50" stroke-width="1.5"/>
  <!-- Zone labels -->
  <text x="250" y="200" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#f44336" opacity="0.9">RESTRICTED</text>
  <text x="525" y="170" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ff9800" opacity="0.9">CONTROLLED</text>
  <text x="240" y="445" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4caf50" opacity="0.9">OPEN ZONE</text>
  <!-- Flight paths -->
  <path d="M 100 520 Q 300 200 600 150" stroke="#42a5f5" stroke-width="2" fill="none" opacity="0.7" stroke-dasharray="10,5"/>
  <path d="M 700 500 Q 550 400 380 350" stroke="#66bb6a" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Drone markers -->
  <circle cx="380" cy="350" r="8" fill="#42a5f5" opacity="0.9"/>
  <circle cx="380" cy="350" r="16" fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.5"/>
  <circle cx="380" cy="350" r="24" fill="none" stroke="#42a5f5" stroke-width="1" opacity="0.3"/>
  <circle cx="580" cy="220" r="6" fill="#66bb6a" opacity="0.9"/>
  <circle cx="580" cy="220" r="14" fill="none" stroke="#66bb6a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="200" cy="480" r="5" fill="#ff9800" opacity="0.8"/>
  <!-- Legend -->
  <rect x="20" y="520" width="12" height="12" fill="#f44336" opacity="0.7"/>
  <text x="38" y="531" font-family="sans-serif" font-size="11" fill="#ccc">Restricted</text>
  <rect x="110" y="520" width="12" height="12" fill="#ff9800" opacity="0.7"/>
  <text x="128" y="531" font-family="sans-serif" font-size="11" fill="#ccc">Controlled</text>
  <rect x="210" y="520" width="12" height="12" fill="#4caf50" opacity="0.7"/>
  <text x="228" y="531" font-family="sans-serif" font-size="11" fill="#ccc">Open</text>
  <text x="400" y="580" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#42a5f5" opacity="0.5">AirspaceOS — Live Airspace Management</text>
</svg>
